<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サポたべのみわップ</title>

<style>
body {
  margin: 0;
  font-size: 16px;
}

#map {
  width: 100%;
  height: 100vh;
}

/* 現在地ボタン */
.button-area {
  position: absolute;
  top: 60px;
  left: 10px;
  z-index: 999;
}

button {
  font-size: 18px;
  padding: 12px 16px;
  border-radius: 10px;
  border: none;
  background: white;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}

/* Google吹き出し */
.gm-style .gm-style-iw {
  font-size: 18px !important;
  line-height: 1.7;
  max-width: 260px;
}

/* スマホ向け */
@media (max-width:768px){

  .gm-style .gm-style-iw{
    font-size:20px !important;
  }

  button{
    font-size:20px;
    padding:14px 18px;
  }

}
</style>

</head>

<body>

<div class="button-area">
  <button onclick="moveToCurrentLocation()">
    現在地
  </button>
</div>

<div id="map"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>

/* Firebase */

const firebaseConfig = {
  apiKey:"AIzaSyCyzwwPiCcUCICxv6kcx7ZlaNkMa46hcVA",
  authDomain:"japan-football-supporters-hub.firebaseapp.com",
  projectId:"japan-football-supporters-hub",
  storageBucket:"japan-football-supporters-hub.firebasestorage.app",
  messagingSenderId:"607581916231",
  appId:"1:607581916231:web:d857fe57f315dea46db562"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let map;
let userLocation=null;
let currentMarker=null;


/* 現在地 */

function moveToCurrentLocation(){

  if(!navigator.geolocation){
    alert("位置情報が使えません");
    return;
  }

  navigator.geolocation.getCurrentPosition(

    function(position){

      const currentPos={
        lat:position.coords.latitude,
        lng:position.coords.longitude
      };

      userLocation=currentPos;

      map.setCenter(currentPos);
      map.setZoom(14);

      if(currentMarker){
        currentMarker.setMap(null);
      }

      currentMarker=new google.maps.Marker({
        position:currentPos,
        map:map,
        title:"現在地",
        icon:"https://maps.google.com/mapfiles/ms/icons/yellow-dot.png"
      });

      loadShops();

    },

    function(){
      alert("位置情報の取得に失敗しました");
    }

  );

}


/* 距離計算 */

function getDistance(lat1,lng1,lat2,lng2){

  const R=6371;

  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;

  const a=
    Math.sin(dLat/2)**2+
    Math.cos(lat1*Math.PI/180)*
    Math.cos(lat2*Math.PI/180)*
    Math.sin(dLng/2)**2;

  const c=
    2*Math.atan2(
      Math.sqrt(a),
      Math.sqrt(1-a)
    );

  return R*c;

}


/* 店舗読込 */

function loadShops(){

  db.collection("shops")
  .get()
  .then(snapshot=>{

    const bounds=
      new google.maps.LatLngBounds();

    snapshot.forEach(doc=>{

      const shop=doc.data();

      let distanceText="";

      if(userLocation){

        const distance=
        getDistance(
          userLocation.lat,
          userLocation.lng,
          Number(shop.lat),
          Number(shop.lng)
        );

        distanceText=
        "距離: "+
        distance.toFixed(2)+
        " km<br>";

      }


      const iconColor=
      shop.away
      ? "https://maps.google.com/mapfiles/ms/icons/red-dot.png"
      : "https://maps.google.com/mapfiles/ms/icons/blue-dot.png";


      const marker=
      new google.maps.Marker({

        position:{
          lat:Number(shop.lat),
          lng:Number(shop.lng)
        },

        map:map,
        title:shop.name,
        icon:iconColor

      });


      bounds.extend(
        marker.getPosition()
      );


      const googleMapLink=
      "https://www.google.com/maps?q="+
      shop.lat+
      ","+
      shop.lng;


      const infoWindow=
      new google.maps.InfoWindow({

        content:

        "<div style='font-size:16px;line-height:1.8'>" +

        "<strong style='font-size:20px'>" +
        shop.name +
        "</strong><br>" +

        "応援クラブ: " +
        shop.team +
        "<br>" +

        distanceText +

        "ジャンル: " +
        shop.genre +
        "<br>" +

        "アウェイ歓迎: " +
        (shop.away ? "歓迎":"厳しい") +
        "<br>" +

        (shop.note || "") +

        "<br><br>" +

        "<a style='font-size:18px' href='" +
        googleMapLink +
        "' target='_blank'>" +

        "Googleマップで開く</a>" +

        "</div>"

      });


      marker.addListener(
        "click",
        ()=>{
          infoWindow.open(
            map,
            marker
          );
        }
      );

    });


    if(!snapshot.empty){

      map.fitBounds(bounds);

      google.maps.event.addListenerOnce(
        map,
        "bounds_changed",
        ()=>{

          if(map.getZoom()>14){
            map.setZoom(14);
          }

        }
      );

    }

  });

}


/* 地図初期化 */

window.initMap=function(){

  map=
  new google.maps.Map(

    document.getElementById("map"),

    {
      center:{
        lat:34.7284,
        lng:135.4814
      },

      zoom:16
    }

  );

  loadShops();

};

</script>


<script
async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDq01peBIq6PC5ESeSG5t2CipVBUCC1WF4&callback=initMap">
</script>

</body>
</html>
