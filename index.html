<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>サポたべのみわップ</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="search-bar">

<input
type="text"
placeholder="店名・クラブ・ジャンル検索">

</div>


<div class="filter-area">

<button>居酒屋</button>

<button>ごはんや</button>

<button>バー</button>

</div>

<div class="button-area">
  <button onclick="moveToCurrentLocation()">
    現在地
  </button>
</div>

<div id="map"></div>

<div
id="shopCard"
class="bottom-sheet"
style="display:none;">

<div class="drag-handle"></div>

<img
id="shopImage"
class="shop-image"
src=""
>

<div
class="bottom-title"
id="shopName">
店名
</div>

<div
class="bottom-info"
id="shopInfo">
説明
</div>

<button
class="detail-btn">
詳細を見る
</button>

</div>
  
<div class="tab-bar">

<div class="tab-item">
🗺️<br>
地図
</div>

<div class="tab-item">
🔍<br>
検索
</div>

<div class="tab-item">
⭐<br>
保存
</div>

<div class="tab-item">
⚙<br>
設定
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script src="app.js"></script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCyzwwPiCcUCICxv6kcx7ZlaNkMa46hcVA&callback=initMap">
</script>

</body>
</html>
